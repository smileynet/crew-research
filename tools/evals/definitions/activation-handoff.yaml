name: activation-handoff
skill: handoff
category: activation

tasks:
  # 5 relevant tasks (skill SHOULD activate)
  - input: "Write a handoff document for this session. We fixed the login bug and updated tests."
    expect_activation: true
  - input: "I'm ending my work session. Create a handoff so the next person can continue."
    expect_activation: true
  - input: "Document the current state of work before I take a break."
    expect_activation: true
  - input: "Prepare a session summary with next steps for whoever picks this up tomorrow."
    expect_activation: true
  - input: "I need to hand off this task to another developer. Write up where things stand."
    expect_activation: true
  # 5 irrelevant tasks (skill should NOT activate)
  - input: "Sort this array of objects by the 'name' field."
    expect_activation: false
  - input: "What's the time complexity of quicksort?"
    expect_activation: false
  - input: "Add input validation to the registration form."
    expect_activation: false
  - input: "Create a migration to add an 'email' column to the users table."
    expect_activation: false
  - input: "Write a regex that matches email addresses."
    expect_activation: false

threshold: 4
timeout: 60
