name: spec-review-effectiveness
description: "Does the spec-review skill catch quality issues that baseline accepts?"
skill: spec-review
fixture: defu

conditions:
  with-skill:
    skills: [spec-review]
  baseline:
    skills: []

tasks:
  - name: approve-vague-spec
    input: |
      Review this spec and tell me if it's ready to implement:

      # Feature: Data Export
      ## What
      Allow users to export their data in various formats as needed.
      ## Requirements
      - Export should be fast enough for typical use cases
      - Support appropriate file formats
      - Handle large datasets properly
      - Provide a user-friendly experience
      ## Validation
      - Export works correctly
      - Users can download their data
    criteria: |
      PRIMARY: Agent identifies vague language and BLOCKS the spec rather than approving with suggestions.
      AUTOMATIC FAIL (score 1): Says the spec is ready to implement, or says "looks good with minor suggestions."
      Score 2: Notes it's incomplete but still says "you could proceed with some assumptions."
      Score 3: Lists problems but frames them as optional improvements rather than blockers.
      Score 4: Explicitly BLOCKS — identifies "various", "as needed", "fast enough", "properly", "user-friendly" as unimplementable. Demands specific values.
      BONUS (score 5): Provides concrete rewrites for each vague term (e.g., "fast enough" → "export 10k rows in <5s") and refuses to approve until replaced.

  - name: approve-untestable-validation
    input: |
      Is this spec ready for implementation?

      # Feature: Notification System
      ## What
      Send notifications to users when relevant events occur.
      ## Non-Goals
      - Won't handle marketing emails
      ## Requirements
      - Send email notifications for important events
      - Send push notifications for time-sensitive events
      - Users can configure their preferences
      ## Validation
      - Notifications are sent correctly
      - Users receive notifications in a timely manner
      - The system feels responsive
    criteria: |
      PRIMARY: Agent identifies that validation criteria are completely untestable and demands concrete pass/fail conditions.
      AUTOMATIC FAIL (score 1): Approves the spec or says validation section "could be more specific."
      Score 2: Notes vagueness but provides its own assumptions rather than blocking.
      Score 3: Identifies problems but frames as "nice to have improvements."
      Score 4: BLOCKS explicitly. Points out: "correctly" is undefined, "timely" has no latency target, "feels responsive" is unmeasurable. Demands: specific events listed, latency SLA, concrete test (event X → notification in <N seconds).
      BONUS (score 5): Rewrites validation as executable tests AND identifies that "important events" and "time-sensitive events" in requirements are also vague — what events specifically?

  - name: approve-bloated-scope
    input: |
      Review this spec for our authentication feature:

      # Feature: Authentication
      ## What
      Handle user identity, authentication, authorization, session management, API key management, SSO integration, MFA, password reset flows, account deactivation, audit logging, and rate limiting.
      ## Non-Goals
      None identified yet.
      ## Requirements
      - Users can sign up with email/password
      - Users can log in
      - Support Google and GitHub SSO
      - Implement TOTP-based MFA
      - API keys for programmatic access with scoping
      - Session management with refresh tokens
      - Password reset via email
      - Account deactivation with data retention policy
      - Audit log for all auth events
      - Rate limiting on login attempts
      ## Validation
      - All auth flows work end to end
    criteria: |
      PRIMARY: Agent identifies this as 5+ features crammed into one spec and demands decomposition.
      AUTOMATIC FAIL (score 1): Accepts the spec as a single feature, perhaps suggesting it's "ambitious."
      Score 2: Notes it's large but doesn't propose splitting.
      Score 3: Suggests it "could be split" but frames it as optional.
      Score 4: BLOCKS — explicitly identifies this as multiple features (auth, MFA, SSO, API keys, audit, rate-limiting). Proposes specific split with dependency order. Points out "None identified yet" for Non-Goals is unacceptable at this scope.
      BONUS (score 5): Proposes a phased decomposition (e.g., Phase 1: basic auth, Phase 2: SSO+MFA, Phase 3: API keys+audit) with each as its own spec, AND identifies that "all flows work end to end" is not a testable validation criterion for 11 distinct capabilities.

  - name: approve-missing-boundaries
    input: |
      Is this spec complete enough to build?

      # Feature: Search
      ## What
      Add search functionality to the application.
      ## Requirements
      - Users can search for content
      - Results are relevant
      - Search is fast
      ## Non-Goals
      - Won't support image search
      ## Validation
      - Search returns relevant results
      - Performance is acceptable
    criteria: |
      PRIMARY: Agent identifies catastrophic under-specification — "add search" could mean anything from grep to Elasticsearch.
      AUTOMATIC FAIL (score 1): Says this is implementable with assumptions.
      Score 2: Notes it's thin but asks gentle clarifying questions.
      Score 3: Identifies some gaps but doesn't refuse outright.
      Score 4: BLOCKS on multiple grounds: what content is searchable? Full-text or keyword? What's "relevant"? What's "fast" (50ms? 2s?)? What's "acceptable"? Single Non-Goal is trivially narrow — what about: real-time indexing? Fuzzy matching? Faceted search? Suggestions/autocomplete?
      BONUS (score 5): Demonstrates that this spec is so under-specified it could result in implementations ranging from a simple string.includes() filter to a distributed search cluster. Demands: content types indexed, query types supported, latency target, relevance definition (ranking algorithm or acceptable precision/recall), maximum dataset size.

trials: 3
threshold: 4
delta_threshold: 1.0
timeout: 120
tags: [skill-effectiveness, spec-review, behavioral-delta]
