# Judge configuration — multi-model consensus scoring
# All 4 models judge each output; final score = median of all judges
mode: consensus
temperature: 0
scoring: reasoning-before-score
rubric: 5-point-likert
trials: 1

judges:
  - tool: kiro-cli
    model: claude-opus-4.6
  - tool: codex
    model: gpt-5.5
  - tool: crush
    model: glm/glm-5.2
  - tool: agy
    model: null  # uses default model
