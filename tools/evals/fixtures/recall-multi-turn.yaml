    # Agent Instructions

    ## MANDATORY: Check recall before answering about past decisions

    When the user asks about past decisions, prior sessions, or project history, you MUST run this command BEFORE answering:

    ```
    recall search "relevant query" --results 5
    ```

    Do not guess or fabricate past decisions. Search first, then answer based on what recall returns.

    Trigger phrases: "what did we decide", "remind me", "last session", "previously", "what was the decision", "what approach did we choose"

    ## Persist decisions

    When a decision is made during the session:
    ```
    recall add "We decided X because Y" --type decision
    ```

