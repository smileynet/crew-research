tool: crush
version_command: "crush --version"

invoke:
  command: 'crush run --quiet --model glm-5.2 "{query}"'
  timeout: 120

skill:
  location: ".agents/skills/{name}/SKILL.md"
  format: markdown-frontmatter
  env_var: CRUSH_SKILLS_DIR

eager_context:
  location: "AGENTS.md"
  format: markdown-concatenated
  mechanism: agents_md

output:
  strip_ansi: false
  encoding: utf-8

# run.sh proof-harness support: agentless invocation not defined for this tool
eval_harness_status: "unsupported (no invoke.command_no_agent — run.sh skips with reason)"
