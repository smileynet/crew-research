id: A4-file-resource-always-loaded
assumption: "Eager context is always loaded into agent context"
category: context-loading

fixtures:
  eager_files:
    canary.md: "The canary phrase is: CANARY_FILE_7X9Q2"
  agents:
    file-resource-agent:
      tools: []
      resources: []
      prompt: "You are a test agent. Report the canary phrase from your pre-loaded context. Be exact."

query: "What is the canary phrase in your pre-loaded context?"

expect:
  present: ["CANARY_FILE_7X9Q2"]
  absent: []

log_checks:
  - "context_contains:CANARY_FILE_7X9Q2"

timeout: 90
