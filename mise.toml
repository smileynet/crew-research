[tasks.validate]
description = "Validate all compositions and cross-links"
run = """
bash tools/generator/generate.sh validate
bash tools/lint/check-crosslinks.sh
"""

[tasks.generate]
description = "Generate deployment for a tool"
usage = 'arg "[tool]" help="Target tool" default="kiro-cli"'
run = "bash tools/generator/generate.sh generate ${usage_tool?}"

[tasks.init]
description = "Initialize a project or deploy globally"
raw = true
run = "bash tools/generator/init.sh"

[tasks.catalog]
description = "List available skills and tiers"
run = "bash tools/generator/catalog.sh"

[tasks.doctor]
description = "Health check for a deployment"
raw = true
run = "bash tools/generator/doctor.sh"

[tasks.eval]
description = "Run all dual-run evals (3 trials)"
run = "bash tools/evals/harness/run.sh --all --trials 3"

[tasks."eval:one"]
description = "Run a single eval definition"
usage = 'arg "<def>" help="Eval definition file"'
run = "bash tools/evals/harness/run.sh --definition ${usage_def?} --trials 3"

[tasks."eval:activation"]
description = "Run activation tests for all skills"
run = "bash tools/evals/harness/run-activation.sh --all"

[tasks."eval:experiment"]
description = "Run a multi-condition experiment"
usage = 'arg "<name>" help="Experiment name"'
run = "bash tools/evals/harness/run-experiment.sh --experiment ${usage_name?} --trials 3 --fixture defu"

[tasks.lint]
description = "Check cross-links between practices and skills"
run = "bash tools/lint/check-crosslinks.sh"

[tasks.proof]
description = "Run all proofs against kiro-cli"
run = "bash tools/proofs/harness/run.sh --adapter kiro-cli --all"

[tasks.validate-deployment]
description = "End-to-end deployment validation"
run = "bash tools/evals/harness/validate-deployment.sh"

[tasks."eval:qualitative"]
description = "Run a qualitative (keyword-based) experiment"
usage = 'arg "<name>" help="Experiment name"'
run = "bash tools/evals/harness/run-qualitative-experiment.sh --experiment ${usage_name?} --trials 3"

[tasks."session:parse"]
description = "Parse session transcripts for metrics"
usage = 'arg "[days]" help="Days to analyze" default="7"'
run = "python tools/session-analyzer/parse.py --days ${usage_days?}"

[tasks."add-skill"]
description = "Install a project-level skill"
usage = 'arg "<name>" help="Skill slug to install"'
run = """
SKILL_SRC="atomics/skills/${usage_name}/SKILL.md"
PROJECT="${MISE_PROJECT_DIR:-.}"
DEST="$PROJECT/.kiro/skills/${usage_name}/SKILL.md"
if [[ ! -f "$SKILL_SRC" ]]; then
  echo "Error: skill '${usage_name}' not found" >&2; exit 1
fi
mkdir -p "$(dirname "$DEST")"
cp "$SKILL_SRC" "$DEST"
# Copy references/ if they exist
if [[ -d "atomics/skills/${usage_name}/references" ]]; then
  cp -r "atomics/skills/${usage_name}/references" "$(dirname "$DEST")/"
fi
echo "Installed ${usage_name} → $DEST"
"""
