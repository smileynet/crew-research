area: tkt

tensions:
  - id: coordination-vs-dumb-files
    desire: "pf-concurrent-sessions-safe"
    constraint: "git-coordination-medium"
    statement: "Concurrent sessions need race-free allocation and visible claims, but the only shared state is plain files in git — there is no server, lock, or database to arbitrate."
    contributing_forces: [allocation-race-free, wip-visible, sequential-readable-ids]
    status: resolved
    formalization: formalized
    resolution_source: "ticket:38#Resolution"
    resolution_gist: "Make the git dance atomic-by-convention inside one tool command: fetch → true-max scan (local+origin) → create → commit → push as the claim; in_progress status pushed for WIP visibility. Random ids (tk's dodge) rejected — sequential readable ids are load-bearing."
    pattern_id: "git-native-claim"
    open_questions: []

  - id: tolerance-vs-trust
    desire: "pf-files-hand-editable"
    constraint: "loud-parse-errors"
    statement: "Hand-editable files invite variance the tool must tolerate (unknown fields, unquoted ids, legacy metadata), but tolerating variance silently is how tickets become invisible or corrupted — tolerance must never become guessing."
    contributing_forces: [ids-as-text, preserve-unknown-fields, zero-migration]
    status: resolved
    formalization: formalized
    resolution_source: "ticket:38#Resolution"
    resolution_gist: "Split tolerance by category: unknown fields preserved verbatim (never interpreted), known fields parsed as raw text lines (no YAML round-trip), anything unparseable is a named hard error in every command. tk's silent omission is the named anti-pattern."
    pattern_id: "preserve-or-fail"
    open_questions: []

  - id: shared-contract-vs-repo-dialects
    desire: "pf-consistent-agent-behavior"
    constraint: "minimal-contract"
    statement: "One tool serving both repos wants one contract, but the repos have real dialect differences (2- vs 3-digit ids, env/spec/priority vs legacy created/closed) and neither may be forced to migrate."
    contributing_forces: [zero-migration, sequential-readable-ids]
    status: resolved
    formalization: formalized
    resolution_source: "ticket:38#Resolution"
    resolution_gist: "Core contract = the intersection (id/title/status/blocked_by); repo needs enter as optional extension fields with absent-field defaults; padding inferred per-repo from existing filenames; unknown fields preserved. Verified: all 77 tickets valid unchanged."
    pattern_id: "intersection-contract"
    open_questions: []

  - id: selection-policy-vs-simple-frontier
    desire: "pf-urgency-out-of-band"
    constraint: "env-filtered-frontier"
    statement: "Next-work selection wants to stay trivially predictable (lowest number first), but urgency flags and machine-policy filters both legitimately override it — each override must compose without making selection inscrutable."
    contributing_forces: [priority-jumps-order]
    status: resolved
    formalization: formalized
    resolution_source: "ticket:38#Resolution + steering:frontier-work"
    resolution_gist: "Fixed precedence: env filter excludes (hard), then priority: high jumps, then lowest-number-first. Selection PROPOSAL stays in steering (Level 4); the computation is the tool's (Level 2)."
    pattern_id: "layered-selection"
    open_questions: []

  - id: automation-vs-ceremony-decay
    desire: "pf-tickets-as-history"
    constraint: "ceremony-decays"
    statement: "Trustworthy history wants dated close-outs, checked ACs, and evidence inline, but every metadata convention not enforced by tooling has demonstrably rotted in both repos."
    contributing_forces: [body-is-prose, structured-tool-output]
    status: resolved
    formalization: formalized
    resolution_source: "ticket:38#Resolution (enforcement-hierarchy split)"
    resolution_gist: "The tool automates what it owns (status flips, dated Resolution stub on close, AC-warning) and validate makes decay visible (unchecked ACs on done = finding); prose quality stays judgment (Level 3), never tool-managed. Fields neither automated nor validated get dropped from the contract."
    pattern_id: "automate-or-drop"
    open_questions: []

  - id: projection-vs-second-truth
    desire: "pf-plan-reflects-truth"
    constraint: "body-is-prose"
    statement: "The plan table wants to mirror ticket status mechanically, but plan documents are curated prose the tool must not own — a generated table risks becoming a second source of truth that drifts anyway."
    contributing_forces: [ceremony-decays, structured-tool-output]
    status: partially-resolved
    formalization: decided-not-formalized
    resolution_source: "ticket:41 (deferred SHOULD R9)"
    resolution_gist: "Drift-CHECK first (fail loudly on mismatch), generation only if drift keeps recurring. Deferred to rollout; MVP ships without it."
    pattern_id: null
    open_questions:
      - "Is a drift-check meaningful against free-form plan tables, or does it require a marked region convention in the plan doc?"

  - id: distribution-vs-bootstrap
    desire: "pf-consistent-agent-behavior"
    constraint: "install-prerequisite-gated"
    statement: "Consistent behavior everywhere wants tkt auto-present on every machine and repo, but crew's extension mechanism gates on PATH presence and tkt itself is the prerequisite — something must install it before anything can depend on it."
    contributing_forces: [tool-name-no-shadow]
    status: resolved
    formalization: decided-not-formalized
    resolution_source: "resolve:2026-07-20 (operator D3a)"
    resolution_gist: "Deferral confirmed: MVP = documented install (uv tool install ./tools/tkt, recall precedent); frontier-work steering keeps the manual protocol as fallback-when-tkt-absent. Tier-extension registration re-decided in ticket 41 with rollout evidence. No pattern until 41 — specs for distribution are out of MVP scope."
    pattern_id: null
    open_questions:
      - "→ ticket 41: tier extension (auto-detect on PATH) vs documented-install-only, decided with rollout evidence"
      - "→ ticket 41: manual-protocol fallback duration in frontier-work steering"

  - id: one-tool-vs-two-repos-git-state
    desire: "pf-concurrent-sessions-safe"
    constraint: "git-coordination-medium"
    statement: "The claim protocol needs fetch/commit/push side effects, but tkt runs inside ANY repo's git context — a wrong-repo invocation or dirty tree could commit garbage or push to the wrong remote."
    contributing_forces: [allocation-race-free, structured-tool-output]
    status: resolved
    formalization: formalized
    resolution_source: "resolve:2026-07-20 (operator D1a, D2a)"
    resolution_gist: "Tool operates on cwd's repo only (.tickets/ presence guard). Push rejection on claim = bounded auto-retry: fetch, re-scan, re-allocate next id, push again (max 3), report the renumber (D1a). Claim/close commits stage ONLY the ticket file — dirty tree never blocks, never leaks (D2a)."
    pattern_id: "surgical-git-side-effects"
    open_questions: []

summary:
  total: 8
