name: deprecated
description: >
  Retired skill names. Deploy (init.sh) prunes these from ~/.kiro/skills/ even
  when the ownership manifest predates them; lint (check-crosslinks.sh) fails
  if a name here reappears in atomics/skills/ or any tier/composition; doctor
  reports deployed dirs matching these names. Symlinks are never pruned — a
  symlinked dir with a deprecated name is someone's live source, not our stale
  copy. Add entries when retiring a skill; never remove entries (machines in
  the field may deploy years apart).
