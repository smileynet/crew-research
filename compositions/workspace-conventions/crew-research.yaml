name: crew-research
description: Workspace convention for the crew-research monorepo. Two-root layout with handoff artifacts and frontmatter requirements.

roots:
  ephemeral: .scratch
  durable: .memory

artifacts:
  handoff:
    path: "{ephemeral}/HANDOFF.md"
    template: handoff
    frontmatter:
      - created_at
      - base_commit
      - handoff_key
    sections:
      - Objective
      - Constraints
      - Prior Decisions
      - Current State
      - Next Steps
      - Evidence
  glossary:
    path: "{durable}/CONTEXT.md"
    description: Term definitions only. No implementation details.
  adr:
    path: "{durable}/adr/NNNN-slug.md"
    description: Hard-to-reverse decisions with real trade-offs.

frontmatter-rule: |
  Any artifact another agent or future session may read MUST carry
  created_at and base_commit in YAML frontmatter.

structure:
  .scratch: Ephemeral artifacts (handoffs, scratch notes). Gitignored.
  .memory: Durable artifacts (glossary, ADRs, resource rehydration)
  .memory/adr: Architecture Decision Records
  .memory/references.md: Rehydration instructions for references/
  docs: Development history (eval results, experiments, research)
  references: Third-party repos/tools for reference/analysis. Gitignored.
  AGENTS.md: Agent-facing entry point (workspace map, commands, conventions)
  README.md: User-facing entry point (what it is, how to use it)

document-placement: |
  Default: .scratch/ (ephemeral) or .memory/ (durable)
  Only docs/: development research, eval results, experiment records
  Never docs/: user-facing content (that goes in README), scratch work
  .references/: third-party code for analysis (gitignored, rehydrate from .memory/references.md)

eager-context:
  - workspace
