kind: contract
id: cli-outputs
from_patterns:
  - "pattern:automate-or-drop"
  - "pattern:layered-selection"
from_model: "model:decay-watcher"
confidence: "★"

protects_experience: "exp-history-trustworthy"
user_story: "Agents and CI consume tkt output mechanically: findings and frontiers arrive as structured JSON with contract exit codes, never as prose to re-parse."

# Covers BOTH output legs from the model's contract candidates:
#   query-output (producer: frontier-selector) — folded into this spec
#   validate-findings (producer: decay-watcher)
# Cluster exception: one spec, two legs — candidates remain separate identities.

sub_schemas:
  TicketRow:
    fields:
      id:
        type: string
        required: true
        description: "Id text, as in the file"
      title:
        type: string
        required: true
      status:
        type: enum
        values: [open, in_progress, done]
        required: true
      blocked_by:
        type: list
        required: true
      env:
        type: string
        required: false
        description: "Present only when set in the file; consumers apply the either-default"
      spec:
        type: string
        required: false
      priority:
        type: string
        required: false
      extensions:
        type: map
        required: false
        description: "Unknown preserved fields, verbatim key→raw-text — query output must not drop them (preserve-or-fail extends to projections)"
  Finding:
    fields:
      file:
        type: string
        required: true
        description: "Ticket filename the finding names (loud-parse-errors: no anonymous findings)"
      rule:
        type: enum
        values: [unparseable, missing-required-field, bad-status, bad-env, duplicate-id, id-filename-mismatch, dangling-blocked-by, cyclic-blocked-by, unchecked-acs-on-done]
        required: true
      message:
        type: string
        required: true
      severity:
        type: enum
        values: [error, warning]
        required: true
        description: "error = contract violation (fails run); warning = decay finding (reported, exit 0 unless --strict)"
  PlanFinding:
    fields:
      file:
        type: string
        required: true
        description: "Ticket filename the drift names"
      rule:
        type: enum
        values: [plan-status-drift, missing-plan-row]
        required: true
      message:
        type: string
        required: true
      severity:
        type: enum
        values: [error, warning]
        required: true
        description: "error = done-state drift (fails run); warning = open ticket lacking a plan row"

events:
  query-output:
    producer: frontier-selector
    consumers: [operator, downstream-tooling]
    stability: public
    payload:
      rows:
        type: list
        required: true
        description: "JSON lines, one TicketRow per ticket, frontier order when invoked as ready"
  validate-findings:
    producer: decay-watcher
    consumers: [operator, ci]
    stability: public
    payload:
      status:
        type: enum
        values: ["pass", "fail", "error"]
        required: true
        description: "Crew validation contract: pass|fail|error + exit 0/1/2"
      findings:
        type: list
        required: true
        description: "List of Finding"
  sync-plan-findings:
    producer: decay-watcher
    consumers: [operator, ci]
    stability: public
    payload:
      status:
        type: enum
        values: ["pass", "fail", "error"]
        required: true
        description: "R9 drift-check, report-only. Crew exit contract kept over Terraform's 2=drift scheme for intra-CLI consistency (decision record 2026-07-22): 0=no drift, 1=drift, 2=crash"
      findings:
        type: list
        required: true
        description: "List of PlanFinding"

lifecycle:
  - state: "produced"
    by: "component:decay-watcher"
    invariant: "status reflects worst finding severity; exit code matches status (0 pass, 1 fail, 2 crash)"

links:
  - target: "pattern:automate-or-drop"
    type: produced-by
